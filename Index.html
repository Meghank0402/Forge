:root{--lime:#d6ff3f;--ink:#0e0f12;--card:#16181d;--card2:#1c1f26;--mute:#3a3f49;
 --grey:#8a909b;--white:#f4f5f3;--line:#24272f;--good:#9bbf1f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:inherit}
html,body{height:100%}
body{background:var(--ink);color:var(--white);font-family:'BarlowS','Helvetica Neue',Arial,sans-serif;
 position:fixed;width:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{height:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column;position:relative}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 110px;display:none}
.screen.active{display:block;animation:fade .24s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tb{display:flex;align-items:center;gap:12px;padding:16px 0 10px;position:sticky;top:0;z-index:6;
 background:linear-gradient(var(--ink),var(--ink) 74%,transparent)}
.back{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);
 display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;color:#fff}
.back:active{background:var(--card2)}
.tbt{font-family:'BarlowB';letter-spacing:.16em;font-size:13px;color:var(--grey);text-transform:uppercase;flex:1}
.brand{font-family:'Anton';font-size:28px;letter-spacing:.05em}
.brand .l{color:var(--lime)}
.chip{font-family:'BarlowB';font-size:12px;letter-spacing:.1em;color:var(--lime);border:1px solid var(--line);
 border-radius:20px;padding:6px 12px;background:var(--card)}
h2.h{font-family:'Anton';font-size:30px;text-transform:uppercase;line-height:.92;margin:2px 0 4px}
.sect{font-family:'BarlowB';letter-spacing:.28em;font-size:11px;color:var(--grey);text-transform:uppercase;margin:22px 4px 11px;display:flex;justify-content:space-between;align-items:center}
.sect a{color:var(--lime);text-decoration:none;letter-spacing:.05em}
/* TODAY */
.today{background:linear-gradient(135deg,#1e222a,#15171c);border:1px solid var(--line);border-radius:20px;padding:20px;margin:6px 0 8px;position:relative;overflow:hidden}
.today:before{content:'';position:absolute;right:-50px;top:-50px;width:170px;height:170px;background:radial-gradient(circle,rgba(214,255,63,.16),transparent 70%)}
.today .lbl{font-family:'BarlowB';letter-spacing:.3em;font-size:11px;color:var(--lime);text-transform:uppercase}
.today .nm{font-family:'Anton';font-size:40px;text-transform:uppercase;line-height:.9;margin:6px 0 3px}
.today .sub{color:var(--grey);font-size:14px}
.today .meta{display:flex;gap:18px;margin-top:13px;color:var(--grey);font-family:'BarlowB';font-size:13px}
.today .meta b{color:#fff}

/* ============ INDEXEDDB (photos) ============ */
function idbOpen(){return new Promise(function(res,rej){try{var r=indexedDB.open('forge_db',1);
 r.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('photos'))db.createObjectStore('photos',{keyPath:'id',autoIncrement:true});};
 r.onsuccess=function(e){res(e.target.result);};r.onerror=function(){rej();};}catch(e){rej();}});}
function idbAdd(o){return idbOpen().then(function(db){return new Promise(function(res){var t=db.transaction('photos','readwrite');t.objectStore('photos').add(o);t.oncomplete=function(){res();};});});}
function idbAll(){return idbOpen().then(function(db){return new Promise(function(res){var t=db.transaction('photos','readonly');var rq=t.objectStore('photos').getAll();rq.onsuccess=function(){res(rq.result||[]);};rq.onerror=function(){res([]);};});}).catch(function(){return[];});}
function idbDel(id){return idbOpen().then(function(db){return new Promise(function(res){var t=db.transaction('photos','readwrite');t.objectStore('photos').delete(id);t.oncomplete=function(){res();};});});}
function idbClear(){return idbOpen().then(function(db){return new Promise(function(res){var t=db.transaction('photos','readwrite');t.objectStore('photos').clear();t.oncomplete=function(){res();};});});}

/* ============ HELPERS ============ */
function lastFor(id){for(var i=DB.history.length-1;i>=0;i--){var e=DB.history[i].entries[id];if(e&&e.length)return e;}return null;}
function repTarget(x){return x.lo===x.hi?(''+x.lo):(x.lo+'–'+x.hi);}
function startOfWeek(){var d=new Date();var dy=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-dy);return d.getTime();}
function fmtDate(ts){var d=new Date(ts);return WD[d.getDay()]+' '+(d.getMonth()+1)+'/'+d.getDate();}

/* ============ NAV ============ */
function tab(name){
 ['train','progress','fuel','you','workout','summary'].forEach(function(s){var el=document.getElementById('s-'+s);if(el)el.classList.remove('active');});
 var map={train:'train',progress:'progress',fuel:'fuel',you:'you'};
 var scr=map[name]||name;document.getElementById('s-'+scr).classList.add('active');
 document.getElementById('s-'+scr).scrollTop=0;
 ['train','progress','fuel','you'].forEach(function(t){var el=document.getElementById('t-'+t);if(el)el.classList.toggle('on',t===name);});
 var bar=document.getElementById('tabbar');bar.classList.toggle('hide',name==='workout');
 if(name==='train')renderTrain();
 if(name==='progress')renderProgress();
 if(name==='fuel')renderFuel();
 if(name==='you')renderYou();
}
function goScreen(s){['train','progress','fuel','you','workout','summary'].forEach(function(x){var el=document.getElementById('s-'+x);if(el)el.classList.remove('active');});document.getElementById('s-'+s).classList.add('active');document.getElementById('s-'+s).scrollTop=0;document.getElementById('tabbar').classList.toggle('hide',s==='workout');}

 }else{box.innerHTML='<div class="lbl">Today · '+WD[gd]+'</div><div class="nm">Rest Day</div><div class="sub">Recovery builds muscle. Eat your protein, take a walk, come back strong.</div>';}
 var pl='';ORDER.forEach(function(id,i){var d=DAYS[id],wd=['MON','TUE','WED','THU','FRI'][i],tr=trainedThisWeek(id);

 document.getElementById('picklist').innerHTML=pl;

function trainedThisWeek(id){var sow=startOfWeek();for(var i=0;i<DB.history.length;i++)if(DB.history[i].dayId===id&&DB.history[i].date>=sow)return true;return false;}

/* ============ WORKOUT ============ */
var session=null;
function startWorkout(dayId){unlockAudio();session={dayId:dayId,sets:{},swaps:{},note:''};
 DAYS[dayId].ex.forEach(function(id){var n=EX[id].sets,last=lastFor(id),rows=[];
  for(var i=0;i<n;i++){var w='';if(last)w=(last[i]?last[i].w:last[last.length-1].w);rows.push({w:w,r:'',done:false});}
  session.sets[id]=rows;});
 var d=DAYS[dayId];document.getElementById('w-top').textContent=d.name+' Day';
 document.getElementById('w-nm').textContent=d.name;document.getElementById('w-ds').textContent=d.sub;
 document.getElementById('w-note').value='';renderBody();goScreen('workout');
}
function renderBody(){var d=DAYS[session.dayId],html='';
 d.ex.forEach(function(id,xi){var x=EX[id],rows=session.sets[id],last=lastFor(id);
  var nameShown=session.swaps[id]||x.name;
  var ready=last&&last.length>=x.sets&&last.every(function(s){return parseInt(s.r,10)>=x.hi;});
  var lastTxt=last?('Last time: '+last.map(function(s){return (s.w||'?')+'×'+(s.r||'?');}).join(', ')+' '+DB.unit):'First time — pick a light weight you can fully control.';
  var sets='';rows.forEach(function(s,si){sets+='<div class="set'+(s.done?' done':'')+'"><div class="sl">SET '+(si+1)+'</div>'+
   '<input inputmode="decimal" placeholder="wt" value="'+(s.w!==''?s.w:'')+'" oninput="upd(\''+id+'\','+si+',\'w\',this.value)">'+
   '<div class="un">'+DB.unit+'</div>'+
   '<input inputmode="numeric" placeholder="'+repTarget(x)+'" value="'+(s.r!==''?s.r:'')+'" oninput="upd(\''+id+'\','+si+',\'r\',this.value)">'+
   '<div class="un">rep</div><button class="dn" onclick="toggleDone(\''+id+'\','+si+')">'+(s.done?'✓':'')+'</button></div>';});
  html+='<div class="exc'+(x.ab?' ab':'')+'"><div class="exh"><div class="ei"><div class="en">'+(xi+1)+'. '+nameShown+
   ' <span class="swap" onclick="openSwap(\''+id+'\')">⇄ Swap</span></div><div class="em">'+(x.ab?'Core':'Target')+'</div></div>'+
   '<div class="tgt"><div class="tv">'+x.sets+' × '+repTarget(x)+'</div><div class="tk">sets × reps</div></div></div>'+
   '<div class="tip"><div class="ti">▸</div><p>'+x.tip+'</p></div>'+(ready?'<div class="up">↑ Hit your reps last time — add a little weight</div>':'')+
   '<div class="last">'+lastTxt+'</div>'+sets+'</div>';});
 document.getElementById('w-body').innerHTML=html;
}
function upd(id,si,k,v){session.sets[id][si][k]=v;}
function toggleDone(id,si){unlockAudio();var s=session.sets[id][si];s.done=!s.done;renderBody();if(s.done)startRest(EX[id].rest);}
function openSwap(id){var x=EX[id],alts=x.alt||[],html='<h3>Swap Exercise</h3>';
 html+='<div class="mrow" onclick="doSwap(\''+id+'\',\'\')"><div class="mn">'+x.name+' (original)</div></div>';
 alts.forEach(function(a){html+='<div class="mrow" onclick="doSwap(\''+id+'\',\''+a.replace(/'/g,"\\'")+'\')"><div class="mn">'+a+'</div></div>';});
 html+='<div class="mclose" onclick="closeModal()">Cancel</div>';
 document.getElementById('mcard').innerHTML=html;document.getElementById('modal').classList.add('on');}
function doSwap(id,name){session.swaps[id]=name;closeModal();renderBody();}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function quitWorkout(){if(confirm('Leave this workout? Unsaved sets will be lost.')){session=null;tab('train');}}

/* rest timer */
var rt={left:0,total:0,iv:null};
function startRest(sec){rt.total=sec;rt.left=sec;drawRest();document.getElementById('rest').classList.add('on');clearInterval(rt.iv);
 rt.iv=setInterval(function(){rt.left--;drawRest();if(rt.left<=0){endRest();beep();if(navigator.vibrate)navigator.vibrate([200,90,200]);}},1000);}
function drawRest(){document.getElementById('rnum').textContent=Math.max(0,rt.left);var c=document.getElementById('rcirc'),circ=2*Math.PI*103;c.setAttribute('stroke-dasharray',circ);c.setAttribute('stroke-dashoffset',circ*(1-Math.max(0,rt.left)/rt.total));}
function addRest(n){rt.left=Math.max(1,rt.left+n);rt.total=Math.max(rt.total,rt.left);drawRest();}
function endRest(){clearInterval(rt.iv);document.getElementById('rest').classList.remove('on');}

/* finish */
function finishWorkout(){var d=DAYS[session.dayId],entries={},setsDone=0,exDone=0;
 d.ex.forEach(function(id){var done=session.sets[id].filter(function(s){return s.done&&(s.w!==''||s.r!=='');});
  if(done.length){entries[id]=done.map(function(s){return {w:s.w,r:s.r};});setsDone+=done.length;exDone++;}});
 if(setsDone===0&&!confirm('No sets logged yet. Finish anyway?'))return;
 DB.history.push({date:Date.now(),dayId:session.dayId,entries:entries,note:document.getElementById('w-note').value||''});persist();
 document.getElementById('sum-ttl').textContent=d.name+' Complete';
 document.getElementById('sum-sub').textContent='Saved. Next time, beat these numbers.';
 document.getElementById('sum-stats').innerHTML='<div class="b"><div class="v">'+exDone+'</div><div class="k">Exercises</div></div><div class="b"><div class="v">'+setsDone+'</div><div class="k">Sets</div></div><div class="b"><div class="v">+15</div><div class="k">Min Walk</div></div>';
 endRest();session=null;goScreen('summary');
}

/* ============ CHART ============ */
function lineChart(data,unit){if(!data||data.length<2)return '<div class="csm" style="padding:14px 0">Log at least 2 entries to see your trend.</div>';
 var w=300,h=120,pad=8,vals=data.map(function(d){return d.v;}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
 if(mn===mx){mn-=1;mx+=1;}var n=data.length;
 function X(i){return pad+i*(w-2*pad)/(n-1);}function Y(v){return h-pad-(v-mn)/(mx-mn)*(h-2*pad);}
 var pts=data.map(function(d,i){return X(i).toFixed(1)+','+Y(d.v).toFixed(1);}).join(' ');
 var dots='';data.forEach(function(d,i){dots+='<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(d.v).toFixed(1)+'" r="3" fill="#d6ff3f"/>';});
 return '<svg class="chart" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="#d6ff3f" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>'+
  '<div class="csm" style="display:flex;justify-content:space-between"><span>'+vals[0]+' '+unit+'</span><span>now '+vals[n-1]+' '+unit+'</span></div>';
}

 var html='<div class="card"><div class="ct"><span>Body Weight</span><button class="addmini" onclick="logWeight()">+ Log</button></div>'+
  '<div class="cbig">'+lw+' <span style="font-size:16px;color:#8a909b">kg</span></div><div class="csm">Start: '+DB.profile.start+' kg · Goal: lean out toward ~68–69 kg</div>'+
  lineChart(DB.weights,'kg')+'</div>';
 html+='<div class="card"><div class="ct"><span>Waist</span><button class="addmini" onclick="logWaist()">+ Log</button></div>'+

function calHTML(){var sow=startOfWeek(),days=['M','T','W','T','F','S','S'],trained={};
 DB.history.forEach(function(h){if(h.date>=sow){var i=(new Date(h.date).getDay()+6)%7;trained[i]=1;}});
 var c='<div class="cal">';for(var i=0;i<7;i++)c+='<div class="d'+(trained[i]?' on':'')+'">'+days[i]+'</div>';c+='</div>';
 var total=DB.history.length;return c+'<div class="csm" style="margin-top:8px">'+total+' total workouts logged all-time.</div>';
}
function logWeight(){var v=prompt('Body weight in kg:');if(v&&!isNaN(parseFloat(v))){DB.weights.push({date:Date.now(),v:parseFloat(v)});persist();renderProgress();}}
function logWaist(){var v=prompt('Waist in cm (measure at the belly button):');if(v&&!isNaN(parseFloat(v))){DB.waists.push({date:Date.now(),v:parseFloat(v)});persist();renderProgress();}}

function renderStrength(){var prs={};
 DB.history.forEach(function(h){for(var id in h.entries){h.entries[id].forEach(function(s){var w=parseFloat(s.w);if(!isNaN(w)){if(!prs[id]||w>prs[id])prs[id]=w;}});}});
 var ids=Object.keys(prs);var html='<div class="card"><div class="ct"><span>Personal Records</span></div>';
 if(!ids.length){html+='<div class="csm" style="padding:12px 0">Finish a few workouts and your best lifts will show here.</div>';}
 else{ids.forEach(function(id){var nm=(EX[id]?EX[id].name:id);html+='<div class="prrow"><div class="pn">'+nm+'</div><div class="pv">'+prs[id]+' '+DB.unit+'</div></div>';});}
 html+='</div>';
 html+='<div class="card"><div class="ct"><span>Recent Sessions</span></div>';
 if(!DB.history.length){html+='<div class="csm" style="padding:12px 0">No sessions yet.</div>';}
 else{for(var i=DB.history.length-1;i>=Math.max(0,DB.history.length-10);i--){var h=DB.history[i],d=DAYS[h.dayId];if(!d)continue;var sets=0;for(var k in h.entries)sets+=h.entries[k].length;
  html+='<div class="prrow"><div class="pn">'+d.name+'<br><span style="color:#8a909b;font-size:12px">'+fmtDate(h.date)+'</span></div><div class="pv">'+sets+' sets</div></div>';}}
 html+='</div>';
 document.getElementById('prog-body').innerHTML=html;
}

/* photos */
var photoType='front';
function renderPhotos(){
 var html='<div class="seg" id="ptype"><button class="'+(photoType==='front'?'on':'')+'" onclick="setPType(\'front\')">Front</button>'+
  '<button class="'+(photoType==='side'?'on':'')+'" onclick="setPType(\'side\')">Side</button>'+
  '<button class="'+(photoType==='back'?'on':'')+'" onclick="setPType(\'back\')">Back</button></div>';
 html+='<button class="btn" onclick="addPhoto()">📷 Add '+photoType+' photo</button>';
 html+='<div id="photoarea"><div class="csm" style="padding:14px 4px">Loading photos…</div></div>';
 document.getElementById('prog-body').innerHTML=html;
 idbAll().then(function(all){var ps=all.filter(function(p){return p.type===photoType;}).sort(function(a,b){return a.date-b.date;});
  var area=document.getElementById('photoarea');if(!area)return;
  if(!ps.length){area.innerHTML='<div class="note" style="margin-top:12px"><p>No '+photoType+' photos yet. Take one today to set your baseline, then add one every couple of weeks to watch yourself change.</p></div>';return;}
  var out='';
  if(ps.length>=2){var a=ps[0],b=ps[ps.length-1];out+='<div class="sect" style="margin-top:14px"><span>Then → Now</span></div><div class="cmp"><div class="ch"><img src="'+a.data+'"><div class="cl">'+fmtDate(a.date)+'</div></div><div class="ch"><img src="'+b.data+'"><div class="cl">'+fmtDate(b.date)+'</div></div></div>';}
  out+='<div class="sect"><span>All '+photoType+' photos</span></div><div class="pgrid">';
  ps.slice().reverse().forEach(function(p){out+='<div class="pcell"><img src="'+p.data+'" onclick="viewPhoto(\''+p.id+'\')"><div class="pd"><span>'+fmtDate(p.date)+'</span><span class="pdel" onclick="delPhoto('+p.id+')">Delete</span></div></div>';});
  out+='</div>';area.innerHTML=out;
 });
}
function setPType(t){photoType=t;renderPhotos();}
var _viewCache={};
function viewPhoto(id){idbAll().then(function(all){var p=all.filter(function(x){return ''+x.id===''+id;})[0];if(p){document.getElementById('vimg').src=p.data;document.getElementById('viewer').classList.add('on');}});}
function closeViewer(){document.getElementById('viewer').classList.remove('on');}
function addPhoto(){var inp=document.getElementById('photoinput');inp.value='';inp.onchange=function(){var f=inp.files[0];if(!f)return;
 resizeImg(f,1000,0.72).then(function(data){return idbAdd({date:Date.now(),type:photoType,data:data});}).then(function(){renderPhotos();}).catch(function(){alert('Could not save photo.');});};inp.click();}
function delPhoto(id){if(confirm('Delete this photo?'))idbDel(id).then(function(){renderPhotos();});}
function resizeImg(file,max,q){return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(){var img=new Image();img.onload=function(){var s=Math.min(1,max/Math.max(img.width,img.height));var c=document.createElement('canvas');c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',q));};img.onerror=rej;img.src=fr.result;};fr.onerror=rej;fr.readAsDataURL(file);});}

function editTargets(){var c=prompt('Daily calories:',DB.targets.cal);if(c===null)return;var pr=prompt('Protein (g):',DB.targets.protein);if(pr===null)return;var wa=prompt('Water (L):',DB.targets.water);if(wa===null)return;
 DB.targets.cal=c;DB.targets.protein=parseInt(pr,10)||DB.targets.protein;DB.targets.water=parseFloat(wa)||DB.targets.water;persist();renderYou();}
function backupData(){idbAll().then(function(photos){var blob=new Blob([JSON.stringify({db:DB,photos:photos})],{type:'application/json'});
 var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='forge-backup-'+today()+'.json';document.body.appendChild(a);a.click();a.remove();
 setTimeout(function(){URL.revokeObjectURL(url);},1000);alert('Backup downloaded. Keep it somewhere safe (email it to yourself, save to Files/iCloud).');});}
function restoreData(){var inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=function(){var f=inp.files[0];if(!f)return;var fr=new FileReader();
 fr.onload=function(){try{var o=JSON.parse(fr.result);if(o.db){DB=o.db;persist();}if(o.photos){idbClear().then(function(){var chain=Promise.resolve();o.photos.forEach(function(p){chain=chain.then(function(){return idbAdd({date:p.date,type:p.type,data:p.data});});});return chain;}).then(function(){alert('Restored!');renderYou();});}else{alert('Restored!');renderYou();}}catch(e){alert('That file could not be read.');}};fr.readAsText(f);};inp.click();}
